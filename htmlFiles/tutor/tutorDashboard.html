<!DOCTYPE html>
<html>
    <head>
        <title>Tutor Dashboard</title>
        <link rel="stylesheet" href="/cssFiles/tutor/tutorStyle.css">
    </head>

<header class="staticHeader">
    <h1>IT Learning Center</h1>
        <nav class="staticNavBar">
            <a href=" ">Home</a>
            <a href=" ">My Appointments</a>
            <a href=" ">My Hours</a>
            <a href=" /tutorLogin">Logout</a>
        </nav>
</header>

<div class="dashboardLayout">
    <div class="sidebar">
        <h2>Tutor Panel</h2>
        <button class="TabButtonActive" onclick="openTab('Appointments')">My Appointments</button>
        <button class="TabButton" onclick="openTab('Hours')">Manage Hours</button>
    </div>
    
<div class="mainContent">
        <div id="Appointments" class="TabButtonActive tabContent">
            <h2>View & Cancel Appointments</h2>
            <p>Table of your appointments here</p>
        </div>

        <div id="Hours" class="tabContent">
            <h2>My Tutoring Hours & Availability</h2>
            <p>Forms for hours here (Google Calendar integration)</p>
        </div>
    </div>
</div>

<footer class="staticFooter">
    2026 IT Learning Center Appointment System. Group Project.
</footer>

<script>
        function openTab(tabId){
            var contents = document.getElementsByClassName("tabContent");
            for(var i = 0; i < contents.length; i++){
                contents[i].classList.remove("TabButtonActive");
            }
            var buttons = document.getElementsByClassName("TabButton");
            for (var i = 0; i < buttons.length; i++){
                buttons[i].classList.remove("Active");
            }
            document.getElementById(tabId).classList.add("TabButtonActive");
        }
</script>
</html>
