<!DOCTYPE html>
<html>
    <head>
        <title>Tutor Login</title>
        <link rel="stylesheet" href="/cssFiles/tutor/tutorStyle.css">
    </head>
    <body class="loginBody">
        <header class="staticHeader">
            <h1>IT Learning Center</h1>
            <nav class="staticNavBar">
                <a href="/home">Home</a>
                <a href="/studentLogin">Student Login</a>
                <a href="/adminLogin">Admin Login</a>
            </nav>
        </header>

        <main class="loginWrapper">
            <section class="loginCard">
                <h2>Tutor Login</h2>
                <p>Sign in to manage your appointments and tutoring hours.</p>

                <form action="/submitTutorLogin" method="POST" class="loginForm">
                    <label for="tutorEmail">Email</label>
                    <input id="tutorEmail" type="email" name="tutorEmail" placeholder="tutor@example.com" required />

                    <label for="tutorPassword">Password</label>
                    <input id="tutorPassword" type="password" name="tutorPassword" placeholder="Enter your password" required />

                    <button type="submit" class="loginButton">Sign In</button>
                </form>
            </section>
        </main>

        <footer class="staticFooter">
            2026 IT Learning Center Appointment System. Group Project.
        </footer>
    </body>
</html>
