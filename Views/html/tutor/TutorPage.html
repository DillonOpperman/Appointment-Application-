<!DOCTYPE html>
<html>
    <head>
        <title>Tutor Page</title>
        <link rel="stylesheet" href="/assets/CSS/tutor/tutorStyle.css">
    </head>
    <body class="loginBody">
        <div class="loginWrapper">
            <div class="loginCard">
                <h2>Tutor Login</h2>
                <p>Sign in to manage your appointments and hours.</p>
                <form class="loginForm" action="/submitTutorLogin" method="POST">
                    <label for="tutorEmail">Email</label>
                    <input id="tutorEmail" type="text" name="tutorEmail" required />

                    <label for="tutorPassword">Password</label>
                    <input id="tutorPassword" type="password" name="tutorPassword" required />

                    <input class="loginButton" type="submit" value="Login" />
                </form>
            </div>
        </div>
    </body>
</html>
